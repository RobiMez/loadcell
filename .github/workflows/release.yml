name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.0.0"
      draft:
        description: "Create as draft release"
        type: boolean
        required: false
        default: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            name: macOS · universal
            artifact: loadcell-darwin-universal.tar.gz
          # Pin to 22.04: Wails v2.12 links against webkit2gtk-4.0, which the
          # 24.04 (noble) ubuntu-latest runner no longer ships. The resulting
          # binary still runs on newer distros via dynamic linking.
          - os: ubuntu-22.04
            platform: linux/amd64
            name: Linux · amd64
            artifact: loadcell-linux-amd64.tar.gz
          - os: windows-latest
            platform: windows/amd64
            name: Windows · amd64
            artifact: loadcell-windows-amd64.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux WebKit deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            build-essential \
            pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build (${{ matrix.platform }})
        shell: bash
        run: |
          wails build -platform ${{ matrix.platform }} -clean -trimpath

      - name: Package · macOS
        if: matrix.os == 'macos-latest'
        run: |
          cd build/bin
          tar -czf ../../${{ matrix.artifact }} loadcell.app

      - name: Package · Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd build/bin
          tar -czf ../../${{ matrix.artifact }} loadcell

      - name: Package · Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/loadcell.exe -DestinationPath ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Inspect
        run: ls -la dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: ${{ inputs.draft }}
          generate_release_notes: true
          files: dist/*
